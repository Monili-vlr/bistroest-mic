<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micrófono</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a1a; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; color:white; }
.card { background:#222; border:1px solid #3a3a3a; border-radius:16px; padding:28px; display:flex; flex-direction:column; align-items:center; gap:14px; width:min(280px,90vw); }
.waves { display:flex; align-items:center; gap:5px; height:40px; }
.wave { width:5px; background:#e0d8c3; border-radius:4px; animation:w 1s ease-in-out infinite; }
.wave:nth-child(1){height:10px;animation-delay:0s}
.wave:nth-child(2){height:20px;animation-delay:.1s}
.wave:nth-child(3){height:36px;animation-delay:.2s}
.wave:nth-child(4){height:20px;animation-delay:.3s}
.wave:nth-child(5){height:10px;animation-delay:.4s}
@keyframes w { 0%,100%{transform:scaleY(.4);opacity:.4} 50%{transform:scaleY(1);opacity:1} }
.text { font-size:14px; color:#e0d8c3; text-align:center; line-height:1.5; min-height:42px; width:100%; word-break:break-word; }
.status { font-size:11px; color:#666; letter-spacing:1px; }
.btns { display:flex; gap:10px; width:100%; }
.btn { flex:1; padding:10px; border-radius:24px; font-size:13px; font-weight:bold; cursor:pointer; transition:.2s; }
.send { background:#e0d8c3; color:#222; border:none; }
.send:disabled { background:#333; color:#555; cursor:not-allowed; }
.send:not(:disabled):hover { background:#fff; }
.cancel { background:none; color:#888; border:1px solid #444; }
.cancel:hover { border-color:#e0d8c3; color:#e0d8c3; }
</style>
</head>
<body>
<div class="card">
  <div class="waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
  <div class="text" id="tr">—</div>
  <div class="status" id="st">Escuchando...</div>
  <div class="btns">
    <button class="btn send" id="sb" onclick="enviar()" disabled>Enviar</button>
    <button class="btn cancel" onclick="window.close()">Cancelar</button>
  </div>
</div>
<script>
var captured = '';
var recog = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recog.lang = 'es-ES';
recog.interimResults = true;
recog.maxAlternatives = 1;
recog.continuous = false;
recog.onresult = function(e) {
  var interim = '', final = '';
  for (var i = e.resultIndex; i < e.results.length; i++) {
    var t = e.results[i][0].transcript;
    if (e.results[i].isFinal) final += t; else interim += t;
  }
  document.getElementById('tr').innerText = final || interim;
  if (final) {
    captured = final;
    document.getElementById('st').innerText = 'Listo — pulsa Enviar';
    document.getElementById('sb').disabled = false;
  }
};
recog.onerror = function(e) {
  document.getElementById('st').innerText = 'Error: ' + e.error;
};
recog.start();
function enviar() {
  var text = captured || document.getElementById('tr').innerText;
  if (!text || text === '—') return;
  if (window.opener) window.opener.postMessage({ type: 'VOICE_INPUT', text: text }, '*');
  window.close();
}
</script>
</body>
</html>
